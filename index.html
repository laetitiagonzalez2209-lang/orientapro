<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrientaPro AI - Démo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFCFB; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [inputText, setInputText] = useState('');
            const [step, setStep] = useState('input');
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const runAnalysis = () => {
                setIsAnalyzing(true);
                // Simulation pour la version démo sans clé API
                setTimeout(() => {
                    setIsAnalyzing(false);
                    setStep('results');
                }, 1500);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-5xl mx-auto mb-12 flex items-center gap-4">
                        <div className="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white font-bold">O</div>
                        <div>
                            <h1 className="text-2xl font-black uppercase tracking-tight">OrientaPro AI</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Conseiller d'Orientation Augmenté</p>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto">
                        {step === 'input' ? (
                            <div className="space-y-8">
                                <div className="text-center mb-12">
                                    <h2 className="text-4xl font-black text-slate-900 mb-4">Analyse de profil professionnel</h2>
                                    <p className="text-slate-500">Collez le CV ou les notes d'entretien ci-dessous pour tester l'interface.</p>
                                </div>
                                <div className="bg-white p-6 rounded-[32px] shadow-xl border border-slate-100">
                                    <textarea
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                        placeholder="Ex: 10 ans d'expérience en vente, souhaite se reconvertir..."
                                        className="w-full h-64 p-6 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-black resize-none mb-6"
                                    />
                                    <button 
                                        onClick={runAnalysis}
                                        disabled={isAnalyzing || !inputText.trim()}
                                        className="w-full bg-black text-white py-4 rounded-xl font-bold flex items-center justify-center gap-3 hover:bg-slate-800 transition-all disabled:bg-slate-300"
                                    >
                                        {isAnalyzing ? "Analyse en cours..." : "Lancer la démonstration"}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <button onClick={() => setStep('input')} className="text-slate-400 hover:text-black font-bold flex items-center gap-2">
                                    ← Retour à la saisie
                                </button>
                                <div className="bg-black text-white p-8 rounded-[40px]">
                                    <h2 className="text-3xl font-black mb-4">Analyse terminée (Mode Démo)</h2>
                                    <p className="text-slate-400">L'interface est prête. Pour activer l'IA réelle, connectez votre clé API dans les paramètres.</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm">
                                        <h3 className="font-bold text-lg mb-2">Soft Skills détectées</h3>
                                        <p className="text-slate-600 italic">Analyse visuelle prête...</p>
                                    </div>
                                    <div className="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm">
                                        <h3 className="font-bold text-lg mb-2">Pistes suggérées</h3>
                                        <p className="text-slate-600 italic">Prêt pour le test métier.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
